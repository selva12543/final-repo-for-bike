<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="resetpassword.css" />
</head>
<body>

  <div class="reset-wrapper">
    <div class="reset-card">
      <h1 class="logo">Reset Password</h1>

      <form id="resetForm" novalidate>

        <!-- Email -->
        <div class="input-group">
          <input type="email" id="email" placeholder="Email Address">
          <small class="error" id="emailError"></small>
        </div>

        <button type="button" class="otp-btn" id="sendOtpBtn">
          Send OTP
        </button>

        <!-- OTP -->
        <div class="input-group otp-group hidden">
          <input type="text" id="otp" placeholder="Enter OTP">
          <small class="timer" id="timer">30s</small>
          <small class="error" id="otpError"></small>
        </div>

        <!-- New Password -->
        <div class="input-group password-group hidden">
          <input type="password" id="newPassword" placeholder="New Password">
          <i class="fa-solid fa-eye" id="togglePassword"></i>
          <small class="error" id="passwordError"></small>
        </div>

        <button type="submit" class="reset-btn hidden">
          Reset Password
        </button>
      </form>

      <p class="login-text">
        Remember your password?
        <a href="index.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="resetpassword.js"></script>
</body>
</html>
