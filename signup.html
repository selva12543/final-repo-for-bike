<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="signup.css" />
</head>
<body>

  <div class="signup-wrapper">
    <div class="signup-card">
      <h1 class="logo">Create Account</h1>

      <form id="signupForm" novalidate>

        <div class="name-row">
          <div class="input-group">
            <input type="text" id="firstName" placeholder="First Name">
            <small class="error" id="firstNameError"></small>
          </div>

          <div class="input-group">
            <input type="text" id="lastName" placeholder="Last Name">
            <small class="error" id="lastNameError"></small>
          </div>
        </div>

        <div class="input-group">
          <input type="tel" id="mobile" placeholder="Mobile Number">
          <small class="error" id="mobileError"></small>
        </div>

        <div class="input-group">
          <input type="email" id="email" placeholder="Email Address">
          <small class="error" id="emailError"></small>
        </div>

        <div class="input-group password-group">
          <input type="password" id="password" placeholder="Password">
          <i class="fa-solid fa-eye" id="togglePassword"></i>
          <small class="error" id="passwordError"></small>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms">
          <label for="terms">
            I agree to the <a href="#">Terms & Conditions</a>
          </label>
        </div>
        <small class="error" id="termsError"></small>

        <button type="submit" class="signup-btn">Sign Up</button>
      </form>

      <p class="login-text">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
